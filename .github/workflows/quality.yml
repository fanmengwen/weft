name: Quality Checks

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Brand hygiene
        run: |
          if git grep -inE 'openflowkit|vrun-design' -- . ':(exclude)LICENSE' ':(exclude).github/workflows/quality.yml'; then
            echo "::error::Legacy brand identifier found in tracked files"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI quality suite
        run: npm run test:ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke suite
        run: npm run e2e:ci
